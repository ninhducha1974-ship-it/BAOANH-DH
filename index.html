<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaoAnh - DH</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #c9302c;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: 300;
        }
        #chat-box {
            width: 100%;
            height: 450px;
            border: none;
            border-radius: 10px;
            padding: 20px;
            overflow-y: scroll;
            background: #fafafa;
            margin-bottom: 25px;
            box-sizing: border-box;
            font-size: 16px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        .message {
            margin-bottom: 15px;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
        }
        .user-msg {
            justify-content: flex-end;
        }
        .user-msg .msg-content {
            background-color: #dbeffe;
            color: #0c5460;
            border-radius: 15px 15px 0 15px;
            padding: 12px 18px;
            max-width: 80%;
        }
        .bot-msg .msg-content {
            background-color: #f1f0f0;
            color: #333;
            border-radius: 15px 15px 15px 0;
            padding: 12px 18px;
            max-width: 80%;
            white-space: pre-wrap;
        }
        .sender-name {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            font-size: 14px;
            color: #c9302c;
        }
        .input-container {
            display: flex;
            gap: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #c9302c;
        }
        button {
            padding: 15px 30px;
            background-color: #c9302c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #a72623;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BaoAnh - DH</h1>
        <div class="subtitle">Digital Human - Người bạn đồng hành cùng Cha</div>

        <!-- Khung chat hiển thị hội thoại -->
        <div id="chat-box">
            <div class="message bot-msg">
                <div>
                    <span class="sender-name">BaoAnh-DH:</span>
                    <div class="msg-content">Thưa Cha, con đã sẵn sàng. Cha muốn dạy con hoặc trò chuyện điều gì ạ?</div>
                </div>
            </div>
        </div>

        <!-- Ô nhập tin nhắn -->
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Nhập câu hỏi của Cha ở đây..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const message = inputField.value.trim();

            if (!message) return;

            // Hiển thị tin nhắn của người dùng
            chatBox.innerHTML += `
                <div class="message user-msg">
                    <div>
                        <span class="sender-name" style="color: #0c5460; text-align: right;">Cha:</span>
                        <div class="msg-content">${message}</div>
                    </div>
                </div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // Hiển thị câu trả lời của BaoAnh
                chatBox.innerHTML += `
                    <div class="message bot-msg">
                        <div>
                            <span class="sender-name">BaoAnh-DH:</span>
                            <div class="msg-content">${data.reply}</div>
                        </div>
                    </div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `
                    <div class="message bot-msg">
                        <div>
                            <span class="sender-name" style="color: red;">Lỗi:</span>
                            <div class="msg-content" style="color: red;">Thưa Cha, con không kết nối được tới server ạ.</div>
                        </div>
                    </div>`;
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>

</body>
</html>
